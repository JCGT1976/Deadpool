<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
<meta name="theme-color" content="#0f1923">
<title>Mi Technologies — Acceso</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
/* ── TOKENS ─────────────────────────────────────────── */
:root{
  --bg:#0f1923;
  --surface:#161f2c;
  --surface2:#1d2a3a;
  --border:#243044;
  --accent:#00c2ff;
  --accent2:#0077b6;
  --green:#00e5a0;
  --red:#ff4d6d;
  --yellow:#ffd166;
  --text:#e8f0f8;
  --muted:#7a95b0;
  --radius:12px;
  --font:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

/* ── LOGIN ──────────────────────────────────────────── */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;
  background:radial-gradient(ellipse at 60% 20%, #0a2540 0%, #0f1923 60%);
}
.login-card{
  width:100%;max-width:360px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:40px 32px;
  box-shadow:0 24px 80px rgba(0,0,0,.5);
}
.login-logo{
  width:52px;height:52px;border-radius:14px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
}
.login-logo svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2}
.login-card h1{font-size:20px;font-weight:700;text-align:center;color:var(--text);margin-bottom:4px}
.login-card p{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field input{
  width:100%;padding:12px 14px;
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);font-size:15px;outline:none;
  transition:border-color .2s;
}
.field input:focus{border-color:var(--accent)}
.btn-primary{
  width:100%;padding:13px;margin-top:8px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;border-radius:10px;color:#fff;
  font-size:15px;font-weight:700;cursor:pointer;
  transition:opacity .2s,transform .1s;
}
.btn-primary:hover{opacity:.9}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
#loginErr{color:var(--red);font-size:12px;font-weight:600;text-align:center;margin-top:12px;min-height:16px}

/* primer acceso */
#cambioBox{margin-top:12px}
#pwdStrength{height:3px;border-radius:2px;margin:-8px 0 10px;transition:all .3s;background:var(--border)}

/* ── APP SHELL ──────────────────────────────────────── */
#app{display:none;min-height:100vh;flex-direction:column}

/* top bar */
.topbar{
  height:56px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:100;
}
.topbar-logo{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.topbar-logo svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5}
.topbar-title{font-size:14px;font-weight:700;color:var(--text);flex:1}
.topbar-user{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
.role-badge{
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;
}
.role-admin{background:rgba(255,77,109,.15);color:var(--red)}
.role-cohost{background:rgba(0,194,255,.15);color:var(--accent)}
.role-view{background:rgba(0,229,160,.15);color:var(--green)}
.role-income{background:rgba(255,209,102,.15);color:var(--yellow)}
.btn-icon{
  background:none;border:1px solid var(--border);border-radius:8px;
  color:var(--muted);padding:6px 10px;cursor:pointer;font-size:12px;
  display:flex;align-items:center;gap:5px;transition:all .2s;white-space:nowrap;
}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}
.btn-icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

/* nav tabs */
.nav{
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;padding:0 16px;overflow-x:auto;gap:4px;
}
.nav-tab{
  padding:12px 16px;font-size:13px;font-weight:500;color:var(--muted);
  border:none;background:none;cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all .2s;
}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-tab:hover:not(.active){color:var(--text)}

/* main content */
.content{padding:20px;max-width:1100px;margin:0 auto;width:100%}

/* ── CARDS KPI ─────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.kpi-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 20px;
}
.kpi-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.kpi-value{font-size:24px;font-weight:800;color:var(--text)}
.kpi-value.positive{color:var(--green)}
.kpi-value.negative{color:var(--red)}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* ── TABLA FINANCIERA ───────────────────────────────── */
.section-title{
  font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

.fin-table{width:100%;border-collapse:collapse;margin-bottom:28px}
.fin-table th{
  font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;
  letter-spacing:.06em;padding:10px 14px;text-align:left;
  border-bottom:1px solid var(--border);background:var(--surface2);
}
.fin-table th:last-child,.fin-table td:last-child{text-align:right}
.fin-table td{
  padding:11px 14px;font-size:13px;color:var(--text);
  border-bottom:1px solid rgba(36,48,68,.5);
}
.fin-table tr:hover td{background:rgba(0,194,255,.03)}
.fin-table tr.subtotal td{font-weight:700;color:var(--accent);background:rgba(0,194,255,.06)}
.fin-table tr.total td{font-weight:800;font-size:14px;color:var(--green);background:rgba(0,229,160,.06)}
.fin-table tr.negative-total td{color:var(--red);background:rgba(255,77,109,.06)}
.fin-table tr.group-header td{
  font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.08em;background:var(--surface2);padding:8px 14px;
}
.amount{font-variant-numeric:tabular-nums;font-family:'Courier New',monospace;font-size:13px}
.amount.neg{color:var(--red)}
.amount.pos{color:var(--green)}

/* ── PANEL ADMIN ────────────────────────────────────── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.panel h3{font-size:14px;font-weight:700;margin-bottom:16px;color:var(--text)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-field label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.form-field input,.form-field select,.form-field textarea{
  width:100%;padding:9px 12px;background:var(--surface2);
  border:1.5px solid var(--border);border-radius:8px;
  color:var(--text);font-size:13px;outline:none;transition:border-color .2s;
}
.form-field input:focus,.form-field select:focus{border-color:var(--accent)}
.form-field select option{background:var(--surface2)}
.btn-sm{
  padding:8px 16px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;
  transition:opacity .2s;
}
.btn-success{background:var(--green);color:#0f1923}
.btn-danger{background:var(--red);color:#fff}
.btn-accent{background:var(--accent);color:#0f1923}
.btn-sm:hover{opacity:.85}

/* usuarios table */
.user-table{width:100%;border-collapse:collapse}
.user-table th{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:8px 12px;border-bottom:1px solid var(--border);text-align:left}
.user-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid rgba(36,48,68,.4)}
.user-table tr:hover td{background:rgba(255,255,255,.02)}

/* ── TOAST ─────────────────────────────────────────── */
#toast{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;
}
#toast.show{transform:translateY(0);opacity:1}
#toast.ok{border-left:3px solid var(--green);color:var(--green)}
#toast.err{border-left:3px solid var(--red);color:var(--red)}

/* ── SESSION TIMER ──────────────────────────────────── */
#sessionBar{
  background:var(--surface2);border-bottom:1px solid var(--border);
  padding:4px 20px;display:flex;align-items:center;justify-content:flex-end;gap:8px;
  font-size:11px;color:var(--muted);
}
#sessionTimer{font-weight:600;font-family:'Courier New',monospace;color:var(--yellow)}

/* ── LOADING SPINNER ────────────────────────────────── */
.spinner{
  width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;margin:40px auto;display:block;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap{text-align:center;padding:40px;color:var(--muted);font-size:13px}

/* ── RESPONSIVE ─────────────────────────────────────── */
@media(max-width:600px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .topbar-user span.name{display:none}
  .btn-icon .label{display:none}
  .content{padding:14px}
}
</style>
</head>
<body>

<!-- ══════════════════ LOGIN ══════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
    </div>
    <h1>Mi Technologies</h1>
    <p id="loginDesc">Reporte financiero confidencial</p>

    <div class="field">
      <label>Usuario</label>
      <input id="usr" type="text" autocapitalize="off" autocomplete="off" placeholder="nombre.apellido">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input id="pwd" type="password" autocomplete="off" placeholder="••••••••">
    </div>

    <!-- primer acceso -->
    <div id="cambioBox" style="display:none">
      <div style="font-size:12px;color:var(--accent);font-weight:600;margin-bottom:12px;padding:10px 12px;background:rgba(0,194,255,.08);border-radius:8px;border-left:3px solid var(--accent)">
        🔐 Primer acceso — elige tu contraseña personal
      </div>
      <div class="field">
        <label>Nueva contraseña</label>
        <input id="pwd2" type="password" autocomplete="new-password" placeholder="Mínimo 8 caracteres">
      </div>
      <div id="pwdStrength"></div>
      <div class="field">
        <label>Confirmar contraseña</label>
        <input id="pwd3" type="password" autocomplete="new-password" placeholder="Repite la contraseña">
      </div>
    </div>

    <button class="btn-primary" id="loginBtn" onclick="doLogin()">Entrar</button>
    <div id="loginErr"></div>
  </div>
</div>

<!-- ══════════════════ APP ══════════════════ -->
<div id="app">
  <!-- top bar -->
  <div class="topbar">
    <div class="topbar-logo">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>
    <div class="topbar-title">Mi Technologies</div>
    <div class="topbar-user">
      <span class="name" id="topName"></span>
      <span class="role-badge" id="topRole"></span>
      <button class="btn-icon" onclick="exportExcel()" id="btnExport">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span class="label">Excel</span>
      </button>
      <button class="btn-icon" onclick="doLogout()">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span class="label">Salir</span>
      </button>
    </div>
  </div>

  <!-- session bar -->
  <div id="sessionBar">
    Sesión activa · expira en <span id="sessionTimer">10:00</span>
    <button class="btn-icon" onclick="resetTimer()" style="padding:2px 8px;font-size:10px">Renovar</button>
  </div>

  <!-- nav tabs -->
  <div class="nav" id="navTabs">
    <button class="nav-tab active" onclick="showTab('dashboard')" data-tab="dashboard">📊 Dashboard</button>
    <button class="nav-tab" onclick="showTab('reporte')" data-tab="reporte">📋 Reporte</button>
    <button class="nav-tab admin-only" onclick="showTab('captura')" data-tab="captura" style="display:none">✏️ Captura</button>
    <button class="nav-tab admin-only" onclick="showTab('usuarios')" data-tab="usuarios" style="display:none">👥 Usuarios</button>
    <button class="nav-tab admin-only" onclick="showTab('catalogo')" data-tab="catalogo" style="display:none">📂 Catálogo</button>
  </div>

  <!-- content area -->
  <div class="content" id="mainContent">
    <div class="loading-wrap"><div class="spinner"></div>Cargando datos…</div>
  </div>
</div>

<!-- toast -->
<div id="toast"></div>

<script>
/* ══════════════════════════════════════════
   CONFIG
══════════════════════════════════════════ */
const SB_URL  = 'https://nzrzrbatcmzcmrmyrama.supabase.co';
const SB_KEY  = 'sb_publishable_JMa-_sAXxw3LQrlqR7p7ww_RqLhY89X';
const { createClient } = supabase;
const sb = createClient(SB_URL, SB_KEY);

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let currentUser = null;
let sessionSeconds = 600;
let sessionInterval = null;
let allData = {};   // cache de datos cargados

/* ══════════════════════════════════════════
   UTILIDADES
══════════════════════════════════════════ */
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function fmt(n) {
  if (n === null || n === undefined || n === '') return '—';
  const num = parseFloat(n);
  if (isNaN(num)) return '—';
  return new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',minimumFractionDigits:0,maximumFractionDigits:0}).format(num);
}

function fmtPct(n) {
  if (n === null || n === undefined) return '—';
  return parseFloat(n).toFixed(1) + '%';
}

function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(()=>{ t.className=''; }, 3500);
}

function setErr(msg) {
  document.getElementById('loginErr').textContent = msg;
}

/* ══════════════════════════════════════════
   SESSION
══════════════════════════════════════════ */
function startTimer() {
  sessionSeconds = 600;
  clearInterval(sessionInterval);
  sessionInterval = setInterval(() => {
    sessionSeconds--;
    const m = Math.floor(sessionSeconds/60).toString().padStart(2,'0');
    const s = (sessionSeconds%60).toString().padStart(2,'0');
    document.getElementById('sessionTimer').textContent = `${m}:${s}`;
    if (sessionSeconds <= 60) document.getElementById('sessionTimer').style.color = 'var(--red)';
    if (sessionSeconds <= 0) doLogout();
  }, 1000);
  document.addEventListener('click', resetTimer);
  document.addEventListener('keydown', resetTimer);
}

function resetTimer() {
  sessionSeconds = 600;
  document.getElementById('sessionTimer').style.color = 'var(--yellow)';
}

/* ══════════════════════════════════════════
   LOGIN
══════════════════════════════════════════ */
document.getElementById('pwd').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('pwd2').addEventListener('input', checkStrength);

function checkStrength() {
  const v = document.getElementById('pwd2').value;
  const bar = document.getElementById('pwdStrength');
  let str = 0;
  if (v.length >= 8) str++;
  if (/[A-Z]/.test(v)) str++;
  if (/[0-9]/.test(v)) str++;
  if (/[^A-Za-z0-9]/.test(v)) str++;
  const colors = ['var(--red)','var(--red)','var(--yellow)','var(--yellow)','var(--green)'];
  bar.style.background = colors[str];
  bar.style.width = (str * 25) + '%';
}

async function doLogin() {
  const usr = document.getElementById('usr').value.trim();
  const pwd = document.getElementById('pwd').value;
  const btn = document.getElementById('loginBtn');
  if (!usr || !pwd) { setErr('Ingresa usuario y contraseña'); return; }

  btn.disabled = true;
  btn.textContent = 'Verificando…';
  setErr('');

  try {
    const hash = await sha256(pwd);
    const { data, error } = await sb
      .from('usuarios')
      .select('*')
      .eq('usuario', usr)
      .single();

    if (error || !data) { setErr('Usuario no encontrado'); btn.disabled=false; btn.textContent='Entrar'; return; }
    if (data.activo === false) { setErr('Cuenta desactivada'); btn.disabled=false; btn.textContent='Entrar'; return; }
    if (data.password_hash !== hash) { setErr('Contraseña incorrecta'); btn.disabled=false; btn.textContent='Entrar'; return; }

    // primer acceso
    if (data.debe_cambiar) {
      document.getElementById('cambioBox').style.display='block';
      document.getElementById('loginDesc').textContent = 'Establece tu contraseña personal';
      btn.textContent = 'Guardar y entrar';
      btn.onclick = () => doFirstChange(data);
      btn.disabled = false;
      return;
    }

    await loginSuccess(data);
  } catch(e) {
    setErr('Error de conexión. Intenta de nuevo.');
    console.error(e);
    btn.disabled=false; btn.textContent='Entrar';
  }
}

async function doFirstChange(userData) {
  const p2 = document.getElementById('pwd2').value;
  const p3 = document.getElementById('pwd3').value;
  if (p2.length < 8) { setErr('Mínimo 8 caracteres'); return; }
  if (p2 !== p3) { setErr('Las contraseñas no coinciden'); return; }

  const newHash = await sha256(p2);
  const { error } = await sb.from('usuarios')
    .update({ password_hash: newHash, debe_cambiar: false })
    .eq('id', userData.id);

  if (error) { setErr('Error al guardar. Intenta de nuevo.'); return; }
  userData.password_hash = newHash;
  userData.debe_cambiar = false;
  toast('Contraseña guardada ✓');
  await loginSuccess(userData);
}

async function loginSuccess(userData) {
  currentUser = userData;
  sessionStorage.setItem('mitech_user', JSON.stringify(userData));
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';
  document.getElementById('topName').textContent = userData.nombre;
  const rb = document.getElementById('topRole');
  rb.textContent = userData.rol;
  rb.className = 'role-badge role-' + userData.rol;

  // mostrar tabs según rol
  if (userData.rol === 'admin' || userData.rol === 'cohost') {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display='');
  }
  if (userData.rol === 'view' || userData.rol === 'income') {
    document.getElementById('btnExport').style.display='none';
  }

  startTimer();
  await loadAllData();
  showTab('dashboard');
}

function doLogout() {
  clearInterval(sessionInterval);
  sessionStorage.removeItem('mitech_user');
  currentUser = null;
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('usr').value='';
  document.getElementById('pwd').value='';
  document.getElementById('pwd2').value='';
  document.getElementById('pwd3').value='';
  document.getElementById('cambioBox').style.display='none';
  document.getElementById('loginBtn').textContent='Entrar';
  document.getElementById('loginBtn').onclick=doLogin;
  document.getElementById('loginBtn').disabled=false;
  setErr('');
  toast('Sesión cerrada');
}

/* ══════════════════════════════════════════
   CARGAR DATOS
══════════════════════════════════════════ */
async function loadAllData() {
  try {
    // Intentar cargar catálogo (nombre probable de tabla)
    const tableNames = ['catalogo','catalogo_conceptos','conceptos','catalogo_financiero','reporte_conceptos'];
    for (const t of tableNames) {
      const { data, error } = await sb.from(t).select('*').limit(100);
      if (!error && data) {
        allData.catalogo = data;
        allData.catalogoTable = t;
        break;
      }
    }

    // Cargar datos financieros (capturas)
    const dataTables = ['datos','datos_financieros','capturas','reporte_datos','financiero'];
    for (const t of dataTables) {
      const { data, error } = await sb.from(t).select('*').limit(500);
      if (!error && data) {
        allData.datos = data;
        allData.datosTable = t;
        break;
      }
    }

    // Usuarios (solo admin)
    if (currentUser.rol === 'admin' || currentUser.rol === 'cohost') {
      const { data } = await sb.from('usuarios').select('id,usuario,nombre,rol,activo,debe_cambiar');
      if (data) allData.usuarios = data;
    }

    console.log('Tablas encontradas:', {
      catalogo: allData.catalogoTable,
      datos: allData.datosTable
    });
    console.log('Catálogo:', allData.catalogo?.length, 'registros');
    console.log('Datos:', allData.datos?.length, 'registros');

  } catch(e) {
    console.error('Error cargando datos:', e);
    toast('Error al cargar datos', 'err');
  }
}

/* ══════════════════════════════════════════
   TABS
══════════════════════════════════════════ */
function showTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  const c = document.getElementById('mainContent');
  switch(tab) {
    case 'dashboard': renderDashboard(c); break;
    case 'reporte':   renderReporte(c); break;
    case 'captura':   renderCaptura(c); break;
    case 'usuarios':  renderUsuarios(c); break;
    case 'catalogo':  renderCatalogo(c); break;
  }
}

/* ══════════════════════════════════════════
   TAB: DASHBOARD
══════════════════════════════════════════ */
function renderDashboard(c) {
  const cat = allData.catalogo || [];
  const dat = allData.datos || [];

  // Calcular totales del catálogo si existe
  let totalIngresos = 0, totalGastos = 0, nConceptos = cat.length;

  // Intentar sumar montos de datos financieros
  dat.forEach(row => {
    const monto = parseFloat(row.monto || row.amount || row.valor || 0);
    const tipo = (row.tipo || row.categoria || row.type || '').toLowerCase();
    if (tipo.includes('ingreso') || tipo.includes('income')) totalIngresos += monto;
    else if (tipo.includes('gasto') || tipo.includes('egreso') || tipo.includes('expense')) totalGastos += monto;
  });

  const utilidad = totalIngresos - totalGastos;
  const margen = totalIngresos > 0 ? (utilidad/totalIngresos*100) : 0;

  c.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Ingresos Totales</div>
        <div class="kpi-value positive">${fmt(totalIngresos)}</div>
        <div class="kpi-sub">Suma acumulada</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Gastos Totales</div>
        <div class="kpi-value negative">${fmt(totalGastos)}</div>
        <div class="kpi-sub">Suma acumulada</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Utilidad Neta</div>
        <div class="kpi-value ${utilidad>=0?'positive':'negative'}">${fmt(utilidad)}</div>
        <div class="kpi-sub">Ingresos − Gastos</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Margen</div>
        <div class="kpi-value ${margen>=0?'positive':'negative'}">${fmtPct(margen)}</div>
        <div class="kpi-sub">Utilidad / Ingresos</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Conceptos</div>
        <div class="kpi-value">${nConceptos}</div>
        <div class="kpi-sub">En catálogo</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Registros</div>
        <div class="kpi-value">${dat.length}</div>
        <div class="kpi-sub">Datos capturados</div>
      </div>
    </div>

    ${renderInfoBlock()}
  `;
}

function renderInfoBlock() {
  const cat = allData.catalogo;
  const dat = allData.datos;

  if (!cat && !dat) {
    return `
      <div class="panel" style="text-align:center;padding:40px">
        <div style="font-size:32px;margin-bottom:12px">🔍</div>
        <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px">Explorando tu base de datos…</div>
        <div style="font-size:13px;color:var(--muted);max-width:400px;margin:0 auto">
          No se encontraron las tablas esperadas. Abre la consola del navegador (F12) para ver qué tablas se detectaron y actualiza el nombre de tabla en el código.
        </div>
        <div style="margin-top:16px">
          <button class="btn-sm btn-accent" onclick="loadAllData().then(()=>showTab('dashboard'))">🔄 Reintentar</button>
        </div>
      </div>`;
  }

  if (cat && cat.length > 0) {
    // Mostrar primeros 5 conceptos del catálogo como preview
    const cols = Object.keys(cat[0]);
    const preview = cat.slice(0,5);
    return `
      <div class="section-title">Vista previa del catálogo</div>
      <div class="panel">
        <table class="fin-table">
          <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
          <tbody>
            ${preview.map(row=>`<tr>${cols.map(c=>`<td>${row[c]??'—'}</td>`).join('')}</tr>`).join('')}
          </tbody>
        </table>
        <div style="font-size:11px;color:var(--muted);margin-top:8px">Mostrando 5 de ${cat.length} registros · Tabla: <code style="color:var(--accent)">${allData.catalogoTable}</code></div>
      </div>`;
  }

  return '';
}

/* ══════════════════════════════════════════
   TAB: REPORTE
══════════════════════════════════════════ */
function renderReporte(c) {
  const cat = allData.catalogo || [];
  const dat = allData.datos || [];

  if (cat.length === 0 && dat.length === 0) {
    c.innerHTML = `<div class="loading-wrap">
      <div style="font-size:13px;color:var(--muted)">Sin datos en catálogo o registros financieros.<br>Ve al tab Catálogo para revisar la conexión.</div>
    </div>`;
    return;
  }

  // Si tenemos catálogo, construir reporte agrupado
  const cols = cat.length > 0 ? Object.keys(cat[0]) : [];
  const colConcepto = cols.find(c => c.toLowerCase().includes('concepto') || c.toLowerCase().includes('nombre') || c.toLowerCase() === 'descripcion') || cols[0];
  const colCategoria = cols.find(c => c.toLowerCase().includes('categoria') || c.toLowerCase().includes('grupo') || c.toLowerCase().includes('tipo')) || null;
  const colMonto = cols.find(c => c.toLowerCase().includes('monto') || c.toLowerCase().includes('amount') || c.toLowerCase().includes('valor') || c.toLowerCase().includes('importe')) || null;

  // Agrupar por categoría si existe
  let html = `<div class="section-title">Estado Financiero</div>`;

  if (colCategoria) {
    const grupos = {};
    cat.forEach(row => {
      const g = row[colCategoria] || 'Sin categoría';
      if (!grupos[g]) grupos[g] = [];
      grupos[g].push(row);
    });

    html += `<table class="fin-table">
      <thead><tr>
        <th>Concepto</th>
        ${colMonto ? '<th>Monto</th>' : ''}
        ${cols.filter(c=>c!==colConcepto&&c!==colCategoria&&c!==colMonto&&c!=='id'&&c!=='created_at').map(c=>`<th>${c}</th>`).join('')}
      </tr></thead>
      <tbody>`;

    let grandTotal = 0;
    Object.entries(grupos).forEach(([grupo, rows]) => {
      html += `<tr class="group-header"><td colspan="99">${grupo}</td></tr>`;
      let subTotal = 0;
      rows.forEach(row => {
        const monto = colMonto ? parseFloat(row[colMonto] || 0) : null;
        if (monto) subTotal += monto;
        const extraCols = cols.filter(c=>c!==colConcepto&&c!==colCategoria&&c!==colMonto&&c!=='id'&&c!=='created_at');
        html += `<tr>
          <td>${row[colConcepto]||'—'}</td>
          ${colMonto ? `<td><span class="amount ${monto<0?'neg':''}">${fmt(monto)}</span></td>` : ''}
          ${extraCols.map(c=>`<td>${row[c]??'—'}</td>`).join('')}
        </tr>`;
      });
      if (colMonto) {
        grandTotal += subTotal;
        html += `<tr class="subtotal"><td>Subtotal ${grupo}</td><td>${fmt(subTotal)}</td></tr>`;
      }
    });

    if (colMonto) {
      html += `<tr class="${grandTotal>=0?'total':'negative-total'}"><td>TOTAL</td><td>${fmt(grandTotal)}</td></tr>`;
    }
    html += `</tbody></table>`;
  } else {
    // Sin categoría, tabla simple
    const visibleCols = cols.filter(c=>c!=='id'&&c!=='created_at');
    html += `<table class="fin-table">
      <thead><tr>${visibleCols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>
        ${cat.map(row=>`<tr>${visibleCols.map(c=>`<td>${row[c]??'—'}</td>`).join('')}</tr>`).join('')}
      </tbody>
    </table>`;
  }

  c.innerHTML = html;
}

/* ══════════════════════════════════════════
   TAB: CAPTURA (admin/cohost)
══════════════════════════════════════════ */
function renderCaptura(c) {
  if (!['admin','cohost'].includes(currentUser.rol)) {
    c.innerHTML = '<div class="loading-wrap">Sin acceso a esta sección.</div>'; return;
  }

  const cat = allData.catalogo || [];
  const optsCat = cat.map(r => {
    const cols = Object.keys(r);
    const colN = cols.find(c=>c.toLowerCase().includes('concepto')||c.toLowerCase().includes('nombre'))||cols[0];
    return `<option value="${r.id||r[cols[0]]}">${r[colN]}</option>`;
  }).join('');

  c.innerHTML = `
    <div class="panel">
      <h3>✏️ Registrar dato financiero</h3>
      <div class="form-grid">
        <div class="form-field">
          <label>Concepto</label>
          <select id="capConcepto">
            <option value="">— Selecciona —</option>
            ${optsCat}
          </select>
        </div>
        <div class="form-field">
          <label>Período (ej. 2025-01)</label>
          <input id="capPeriodo" type="month" value="${new Date().toISOString().slice(0,7)}">
        </div>
        <div class="form-field">
          <label>Monto (MXN)</label>
          <input id="capMonto" type="number" placeholder="0.00" step="0.01">
        </div>
        <div class="form-field">
          <label>Tipo</label>
          <select id="capTipo">
            <option value="ingreso">Ingreso</option>
            <option value="egreso">Egreso</option>
            <option value="presupuesto">Presupuesto</option>
          </select>
        </div>
        <div class="form-field" style="grid-column:1/-1">
          <label>Notas (opcional)</label>
          <input id="capNotas" type="text" placeholder="Observaciones…">
        </div>
      </div>
      <div style="margin-top:16px;display:flex;gap:10px">
        <button class="btn-sm btn-success" onclick="saveCaptura()">💾 Guardar registro</button>
        <button class="btn-sm btn-accent" onclick="loadAllData().then(()=>showTab('captura'))">🔄 Recargar</button>
      </div>
    </div>

    <div class="section-title">Registros recientes</div>
    <div id="capTabla">
      ${renderDatosTable()}
    </div>
  `;
}

function renderDatosTable() {
  const dat = allData.datos || [];
  if (dat.length === 0) return `<div class="loading-wrap" style="padding:20px">Sin registros aún.</div>`;
  const cols = Object.keys(dat[0]).filter(c=>c!=='id');
  return `
    <div class="panel">
      <table class="fin-table">
        <thead><tr><th>#</th>${cols.map(c=>`<th>${c}</th>`).join('')}${currentUser.rol==='admin'?'<th></th>':''}</tr></thead>
        <tbody>
          ${dat.slice(0,50).map((row,i)=>`
            <tr>
              <td style="color:var(--muted)">${i+1}</td>
              ${cols.map(c=>`<td>${row[c]??'—'}</td>`).join('')}
              ${currentUser.rol==='admin'?`<td><button class="btn-sm btn-danger" onclick="deleteRegistro('${row.id}')">✕</button></td>`:''}
            </tr>
          `).join('')}
        </tbody>
      </table>
      <div style="font-size:11px;color:var(--muted);margin-top:8px">Mostrando ${Math.min(50,dat.length)} de ${dat.length} registros</div>
    </div>`;
}

async function saveCaptura() {
  const concepto_id = document.getElementById('capConcepto').value;
  const periodo     = document.getElementById('capPeriodo').value;
  const monto       = parseFloat(document.getElementById('capMonto').value);
  const tipo        = document.getElementById('capTipo').value;
  const notas       = document.getElementById('capNotas').value;

  if (!concepto_id || !periodo || isNaN(monto)) {
    toast('Completa concepto, período y monto', 'err'); return;
  }

  const tableName = allData.datosTable || 'datos_financieros';
  const payload = { concepto_id, periodo, monto, tipo, notas, capturado_por: currentUser.nombre };

  const { error } = await sb.from(tableName).insert([payload]);
  if (error) {
    // Si la tabla no existe, intentar crearla via SQL no es posible con anon key
    toast(`Error: ${error.message}`, 'err');
    console.error(error);
    return;
  }
  toast('Registro guardado ✓');
  document.getElementById('capMonto').value = '';
  document.getElementById('capNotas').value = '';
  await loadAllData();
  document.getElementById('capTabla').innerHTML = renderDatosTable();
}

async function deleteRegistro(id) {
  if (!confirm('¿Eliminar este registro?')) return;
  const { error } = await sb.from(allData.datosTable).delete().eq('id', id);
  if (error) { toast('Error al eliminar', 'err'); return; }
  toast('Registro eliminado');
  await loadAllData();
  showTab('captura');
}

/* ══════════════════════════════════════════
   TAB: USUARIOS (admin)
══════════════════════════════════════════ */

  if (currentUser.rol !== 'admin') {
    c.innerHTML = '<div class="loading-wrap">Solo administradores.</div>'; return;
  }
  const users = allData.usuarios || [];

  c.innerHTML = `
    <div class="panel">
      <h3>👥 Gestión de usuarios</h3>
      <table class="user-table">
        <thead><tr><th>Usuario</th><th>Nombre</th><th>Rol</th><th>Activo</th><th>1er Acceso</th><th>Acciones</th></tr></thead>
        <tbody>
          ${users.map(u=>`
            <tr>
              <td><code style="color:var(--accent)">${u.usuario}</code></td>
              <td>${u.nombre}</td>
              <td><span class="role-badge role-${u.rol}">${u.rol}</span></td>
              <td>${u.activo ? '✅' : '❌'}</td>
              <td>${u.debe_cambiar ? '⏳ Pendiente' : '✓'}</td>
              <td style="display:flex;gap:6px">
                ${u.id !== currentUser.id ? `
                  <button class="btn-sm ${u.activo?'btn-danger':'btn-success'}" onclick="toggleUser('${u.id}',${u.activo})">
                    ${u.activo?'Desactivar':'Activar'}
                  </button>
                  <button class="btn-sm btn-accent" onclick="resetPwd('${u.id}')">Reset pwd</button>
                ` : '<span style="color:var(--muted);font-size:11px">(tú)</span>'}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    <div class="panel">
      <h3>➕ Nuevo usuario</h3>
      <div class="form-grid">
        <div class="form-field">
          <label>Usuario (login)</label>
          <input id="nuUsuario" type="text" placeholder="juan.perez">
        </div>
        <div class="form-field">
          <label>Nombre completo</label>
          <input id="nuNombre" type="text" placeholder="Juan Pérez">
        </div>
        <div class="form-field">
          <label>Rol</label>
          <select id="nuRol">
            <option value="view">view</option>
            <option value="income">income</option>
            <option value="cohost">cohost</option>
            <option value="admin">admin</option>
          </select>
        </div>
        <div class="form-field">
          <label>Contraseña inicial</label>
          <input id="nuPwd" type="password" placeholder="Mínimo 8 caracteres">
        </div>
      </div>
      <div style="margin-top:16px">
        <button class="btn-sm btn-success" onclick="createUser()">➕ Crear usuario</button>
      </div>
    </div>
  `;
}

async function toggleUser(id, activo) {
  const { error } = await sb.from('usuarios').update({ activo: !activo }).eq('id', id);
  if (error) { toast('Error al actualizar', 'err'); return; }
  toast(`Usuario ${activo?'desactivado':'activado'} ✓`);
  const { data } = await sb.from('usuarios').select('id,usuario,nombre,rol,activo,debe_cambiar');
  if (data) allData.usuarios = data;
  showTab('usuarios');
}

async function resetPwd(id) {
  if (!confirm('¿Forzar cambio de contraseña en el próximo acceso?')) return;
  const { error } = await sb.from('usuarios').update({ debe_cambiar: true }).eq('id', id);
  if (error) { toast('Error', 'err'); return; }
  toast('Se pedirá nueva contraseña en el próximo acceso ✓');
  const { data } = await sb.from('usuarios').select('id,usuario,nombre,rol,activo,debe_cambiar');
  if (data) allData.usuarios = data;
  showTab('usuarios');
}

async function createUser() {
  const usuario = document.getElementById('nuUsuario').value.trim();
  const nombre  = document.getElementById('nuNombre').value.trim();
  const rol     = document.getElementById('nuRol').value;
  const pwd     = document.getElementById('nuPwd').value;

  if (!usuario||!nombre||!pwd) { toast('Completa todos los campos', 'err'); return; }
  if (pwd.length < 8) { toast('Contraseña mínimo 8 caracteres', 'err'); return; }

  const hash = await sha256(pwd);
  const { error } = await sb.from('usuarios').insert([{
    usuario, nombre, rol, password_hash: hash, activo: true, debe_cambiar: false
  }]);
  if (error) { toast(`Error: ${error.message}`, 'err'); return; }
  toast(`Usuario ${usuario} creado ✓`);
  const { data } = await sb.from('usuarios').select('id,usuario,nombre,rol,activo,debe_cambiar');
  if (data) allData.usuarios = data;
  showTab('usuarios');
}

/* ══════════════════════════════════════════
   EXPORT EXCEL
══════════════════════════════════════════ */
function exportExcel() {
  const cat = allData.catalogo || [];
  const dat = allData.datos || [];
  if (cat.length === 0 && dat.length === 0) { toast('Sin datos para exportar', 'err'); return; }

  const wb = XLSX.utils.book_new();
  if (cat.length > 0) {
    const ws1 = XLSX.utils.json_to_sheet(cat);
    XLSX.utils.book_append_sheet(wb, ws1, 'Catálogo');
  }
  if (dat.length > 0) {
    const ws2 = XLSX.utils.json_to_sheet(dat);
    XLSX.utils.book_append_sheet(wb, ws2, 'Datos Financieros');
  }
  const fecha = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `MiTech_Reporte_${fecha}.xlsx`);
  toast('Excel descargado ✓');
}
