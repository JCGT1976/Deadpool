function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function unlock(){
  const pwd=document.getElementById('pwd').value.trim().toUpperCase();
  const err=document.getElementById('err');err.textContent='';
  try{
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey('raw',enc.encode(pwd),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(B.salt),iterations:B.iter,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(B.iv)},key,b64(B.ct));
    const c=document.getElementById('content');
    c.innerHTML=new TextDecoder().decode(plain)+'<div class="foot">Reporte confidencial · Proyecto Deadpool</div>';
    document.getElementById('lock').style.display='none';
    c.style.display='block';
    window.scrollTo(0,0);
  }catch(e){err.textContent='Clave incorrecta. Verifica e intenta de nuevo.';}
}
document.getElementById('pwd').addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});
document.addEventListener('click',function(e){
  var fb=e.target.closest('.fbtn');
  if(fb){var t=document.getElementById(fb.getAttribute('data-target'));if(t){t.classList.toggle('open');fb.classList.toggle('act');}return;}
  var ch=e.target.closest('.cath');
  if(ch){ch.parentElement.classList.toggle('open');return;}
});
</script>
