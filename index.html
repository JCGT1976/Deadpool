var idleTimer=null;
function b64(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
async function sha256hex(str){var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');}
function saveSession(role,name){
  try{sessionStorage.setItem('mitech_sess',JSON.stringify({role:role,name:name,exp:Date.now()+IDLE_MS}));}catch(e){}
}
function clearSession(){try{sessionStorage.removeItem('mitech_sess');}catch(e){}}
function touchSession(){
  try{var s=JSON.parse(sessionStorage.getItem('mitech_sess')||'null');if(s){s.exp=Date.now()+IDLE_MS;sessionStorage.setItem('mitech_sess',JSON.stringify(s));}}catch(e){}
  resetIdle();
}
function resetIdle(){
  if(idleTimer)clearTimeout(idleTimer);
  idleTimer=setTimeout(function(){doLogout('Tu sesión se cerró por inactividad.');},IDLE_MS);
}
function doLogout(msg){
  clearSession();
  if(idleTimer)clearTimeout(idleTimer);
  try{var c=document.getElementById('content');c.style.display='none';c.innerHTML='';}catch(e){}
  document.getElementById('login').style.display='flex';
  document.getElementById('usr').value=''; document.getElementById('pwd').value='';
  document.getElementById('lerr').textContent=msg||'';
}
async function openReport(role,name){
  var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(MASTER),'PBKDF2',false,['deriveKey']);
  var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(B.salt),iterations:B.iter,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  var plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(B.iv)},key,b64(B.ct));
  var c=document.getElementById('content');
  window.__ROLE__=role;
  window.__USERNAME__=name;
  c.innerHTML=new TextDecoder().decode(plain)+'<div class="foot">Reporte confidencial · Proyecto Deadpool</div>';
  document.getElementById('login').style.display='none';
  c.style.display='block';
  document.getElementById('ubName').textContent=name;
  var rl=document.getElementById('ubRole');
  var rmap={admin:'Administrador',cohost:'Co-host',income:'Co-host Ingresos',view:'Visualizador'};
  rl.textContent=rmap[role]; rl.className='role'+(role==='cohost'?' cohost':(role==='income'?' cohost':(role==='view'?' view':'')));
  document.getElementById('ubLogout').onclick=function(){doLogout('');};
  var scripts=c.querySelectorAll('script');
  scripts.forEach(function(old){var s=document.createElement('script');if(old.src){s.src=old.src;}else{s.textContent=old.textContent;}document.body.appendChild(s);});
  if(window.__initReport__)window.__initReport__(role);
  window.scrollTo(0,0);
  // activar control de inactividad
  ['click','keydown','scroll','touchstart','mousemove'].forEach(function(ev){document.addEventListener(ev,touchSession,{passive:true});});
  resetIdle();
}
async function doLogin(){
  var u=document.getElementById('usr').value.trim().toLowerCase();
  var p=document.getElementById('pwd').value.trim().toUpperCase();
  var err=document.getElementById('lerr'); err.textContent='';
  var h=await sha256hex(u+'|'+p);
  var info=CREDS[h];
  if(!info){err.textContent='Usuario o contraseña incorrectos.';return;}
  try{
    saveSession(info.role,info.name);
    await openReport(info.role,info.name);
  }catch(e){err.textContent='Error al abrir el reporte.';}
}

      openReport(s.role,s.name);
    } else if(s){ clearSession(); }
  }catch(e){}
});
