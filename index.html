*{box-sizing:border-box;margin:0;padding:0;-webkit-text-size-adjust:100%}

#login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}

var MASTER="MITECH-DEADPOOL-2026-MASTER";
var IDLE_MS=5*60*1000; // 5 minutos de inactividad
// === Conexión Supabase ===
var SUPA_URL="https://nzrzrbatcmzcmrmyrama.supabase.co";
var SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56cnpyYmF0Y216Y21ybXlyYW1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzYyMjEsImV4cCI6MjA5NzcxMjIyMX0.BlSTgF9gi4zMlQwPMzhzTiju-OJys4AD5Nqmf3yJX18";
var supa=null;
function crearSupa(){
  if(supa) return supa;
  try{ if(window.supabase&&window.supabase.createClient){ supa=window.supabase.createClient(SUPA_URL,SUPA_KEY); window.__supa=supa; } }catch(e){ console.warn('Supabase no disponible:',e); }
  return supa;
}
crearSupa();
// Reintenta si el CDN aún no había cargado al evaluar este bloque
window.__ensureSupa=function(){
  return new Promise(function(resolve){
    if(crearSupa()){ resolve(supa); return; }
    var intentos=0;
    var t=setInterval(function(){
      intentos++;
      if(crearSupa()||intentos>=40){ clearInterval(t); resolve(supa); }
    },100); // hasta ~4s esperando el CDN
  });
};
var idleTimer=null;
function b64(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0);});}
async function sha256hex(str){var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');}
function saveSession(role,name,username){
  try{sessionStorage.setItem('mitech_sess',JSON.stringify({role:role,name:name,username:username||'',exp:Date.now()+IDLE_MS}));}catch(e){}
}
function clearSession(){try{sessionStorage.removeItem('mitech_sess');}catch(e){}}
function touchSession(){
  try{var s=JSON.parse(sessionStorage.getItem('mitech_sess')||'null');if(s){s.exp=Date.now()+IDLE_MS;sessionStorage.setItem('mitech_sess',JSON.stringify(s));}}catch(e){}
  resetIdle();
}
function resetIdle(){
  if(idleTimer)clearTimeout(idleTimer);
  idleTimer=setTimeout(function(){doLogout('Tu sesión se cerró por inactividad.');},IDLE_MS);
}
function doLogout(msg){
  clearSession();
  if(idleTimer)clearTimeout(idleTimer);
  try{var c=document.getElementById('content');c.style.display='none';c.innerHTML='';}catch(e){}
  document.getElementById('login').style.display='flex';
  document.getElementById('usr').value=''; document.getElementById('pwd').value='';
  document.getElementById('lerr').textContent=msg||'';
}
async function openReport(role,name,username){
  var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(MASTER),'PBKDF2',false,['deriveKey']);
  var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(B.salt),iterations:B.iter,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  var plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(B.iv)},key,b64(B.ct));
  var c=document.getElementById('content');
  window.__ROLE__=role;
  window.__USERNAME__=username||name;
  c.innerHTML=new TextDecoder().decode(plain)+'<div class="foot">Reporte confidencial · Proyecto Deadpool</div>';
  document.getElementById('login').style.display='none';
  c.style.display='block';
  document.getElementById('ubName').textContent=name;
  var rl=document.getElementById('ubRole');
  var rmap={admin:'Administrador',cohost:'Co-host',income:'Co-host Ingresos',view:'Visualizador'};
  rl.textContent=rmap[role]; rl.className='role'+(role==='cohost'?' cohost':(role==='income'?' cohost':(role==='view'?' view':'')));
  document.getElementById('ubLogout').onclick=function(){doLogout('');};
  var scripts=c.querySelectorAll('script');
  scripts.forEach(function(old){var s=document.createElement('script');if(old.src){s.src=old.src;}else{s.textContent=old.textContent;}document.body.appendChild(s);});
  if(window.__initReport__)window.__initReport__(role);
  window.scrollTo(0,0);
  // activar control de inactividad
  ['click','keydown','scroll','touchstart','mousemove'].forEach(function(ev){document.addEventListener(ev,touchSession,{passive:true});});
  resetIdle();
}
// Estado del login
var _loginUser=null; // usuario actual en proceso de login

async function doLogin(){
  var u=document.getElementById('usr').value.trim().toLowerCase();
  var p=document.getElementById('pwd').value.trim().toUpperCase();
  var err=document.getElementById('lerr'); err.textContent='';
  var cambioBox=document.getElementById('cambioBox');
  var loginBtn=document.getElementById('loginBtn');

  // Si estamos en modo cambio de contraseña
  if(cambioBox&&cambioBox.style.display!=='none'&&_loginUser){
    var p2=document.getElementById('pwd2').value.trim();
    var p3=document.getElementById('pwd3').value.trim();
    if(!p2||p2.length<6){err.textContent='La contraseña debe tener al menos 6 caracteres.';return;}
    if(p2!==p3){err.textContent='Las contraseñas no coinciden.';return;}
    await cambiarPasswordPrimerAcceso(_loginUser,p2);
    return;
  }

  if(!u||!p){err.textContent='Ingresa usuario y contraseña.';return;}
  loginBtn.textContent='Verificando...'; loginBtn.disabled=true;

  try{
    // Intentar login contra Supabase primero
    if(supa){
      var h=await sha256hex(u+'|'+p);
      var r=await supa.from('usuarios').select('*').eq('username',u).eq('activo',true).single();
      if(r.data){
        var usr=r.data;
        if(usr.pwd_hash!==h){
          err.textContent='Usuario o contraseña incorrectos.';
          loginBtn.textContent='Entrar'; loginBtn.disabled=false; return;
        }
        // Actualizar último acceso
        await supa.from('usuarios').update({ultimo_acceso:new Date().toISOString()}).eq('username',u);
        // ¿Debe cambiar contraseña?
        if(usr.debe_cambiar){
          _loginUser=usr;
          cambioBox.style.display='block';
          document.getElementById('loginDesc').textContent='Bienvenido/a '+usr.nombre.split(' ')[0]+'. Elige tu contraseña personal.';
          loginBtn.textContent='Establecer contraseña';
          loginBtn.disabled=false; return;
        }
        saveSession(usr.rol,usr.nombre,u);
        await openReport(usr.rol,usr.nombre,u);
        return;
      }
    }
  }catch(e){ console.warn('Supabase login error:',e); }

  // Fallback: login local con CREDS (por si no hay conexión)
  var h2=await sha256hex(u+'|'+p);
  var info=CREDS[h2];
  if(!info){err.textContent='Usuario o contraseña incorrectos.';loginBtn.textContent='Entrar';loginBtn.disabled=false;return;}
  try{
    saveSession(info.role,info.name,u);
    await openReport(info.role,info.name,u);
  }catch(e){err.textContent='Error al abrir el reporte.';loginBtn.textContent='Entrar';loginBtn.disabled=false;}
}

async function cambiarPasswordPrimerAcceso(usr,newPwd){
  var err=document.getElementById('lerr'); err.textContent='';
  var loginBtn=document.getElementById('loginBtn');
  loginBtn.textContent='Guardando...'; loginBtn.disabled=true;
  try{
    var newH=await sha256hex(usr.username+'|'+newPwd.toUpperCase());
    var r=await supa.from('usuarios').update({pwd_hash:newH,debe_cambiar:false}).eq('username',usr.username);
    if(r.error){err.textContent='Error al guardar la contraseña. Intenta de nuevo.';loginBtn.textContent='Establecer contraseña';loginBtn.disabled=false;return;}
    usr.debe_cambiar=false; usr.pwd_hash=newH;
    document.getElementById('cambioBox').style.display='none';
    saveSession(usr.rol,usr.nombre,usr.username);
    await openReport(usr.rol,usr.nombre,usr.username);
  }catch(e){err.textContent='Error de conexión. Intenta de nuevo.';loginBtn.textContent='Establecer contraseña';loginBtn.disabled=false;}
}

    if(s && s.exp && Date.now()<s.exp){
      saveSession(s.role,s.name,s.username||'');
      openReport(s.role,s.name,s.username||'');
    } else if(s){ clearSession(); }
  }catch(e){}
});
