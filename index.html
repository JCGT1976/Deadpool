<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
<meta name="theme-color" content="#0f1923">
<title>Mi Technologies — Acceso</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
/* ── TOKENS ─────────────────────────────────────────── */
:root{
  --bg:#0f1923;
  --surface:#161f2c;
  --surface2:#1d2a3a;
  --border:#243044;
  --accent:#00c2ff;
  --accent2:#0077b6;
  --green:#00e5a0;
  --red:#ff4d6d;
  --yellow:#ffd166;
  --text:#e8f0f8;
  --muted:#7a95b0;
  --radius:12px;
  --font:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

/* ── LOGIN ──────────────────────────────────────────── */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;
  background:radial-gradient(ellipse at 60% 20%, #0a2540 0%, #0f1923 60%);
}
.login-card{
  width:100%;max-width:360px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:40px 32px;
  box-shadow:0 24px 80px rgba(0,0,0,.5);
}
.login-logo{
  width:52px;height:52px;border-radius:14px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
}
.login-logo svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2}
.login-card h1{font-size:20px;font-weight:700;text-align:center;color:var(--text);margin-bottom:4px}
.login-card p{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field input{
  width:100%;padding:12px 14px;
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);font-size:15px;outline:none;
  transition:border-color .2s;
}
.field input:focus{border-color:var(--accent)}
.btn-primary{
  width:100%;padding:13px;margin-top:8px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border:none;border-radius:10px;color:#fff;
  font-size:15px;font-weight:700;cursor:pointer;
  transition:opacity .2s,transform .1s;
}
.btn-primary:hover{opacity:.9}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
#loginErr{color:var(--red);font-size:12px;font-weight:600;text-align:center;margin-top:12px;min-height:16px}

/* primer acceso */
#cambioBox{margin-top:12px}
#pwdStrength{height:3px;border-radius:2px;margin:-8px 0 10px;transition:all .3s;background:var(--border)}

/* ── APP SHELL ──────────────────────────────────────── */
#app{display:none;min-height:100vh;flex-direction:column}

/* top bar */
.topbar{
  height:56px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:100;
}
.topbar-logo{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.topbar-logo svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5}
.topbar-title{font-size:14px;font-weight:700;color:var(--text);flex:1}
.topbar-user{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px}
.role-badge{
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;
}
.role-admin{background:rgba(255,77,109,.15);color:var(--red)}
.role-cohost{background:rgba(0,194,255,.15);color:var(--accent)}
.role-view{background:rgba(0,229,160,.15);color:var(--green)}
.role-income{background:rgba(255,209,102,.15);color:var(--yellow)}
.btn-icon{
  background:none;border:1px solid var(--border);border-radius:8px;
  color:var(--muted);padding:6px 10px;cursor:pointer;font-size:12px;
  display:flex;align-items:center;gap:5px;transition:all .2s;white-space:nowrap;
}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}
.btn-icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

/* nav tabs */
.nav{
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;padding:0 16px;overflow-x:auto;gap:4px;
}
.nav-tab{
  padding:12px 16px;font-size:13px;font-weight:500;color:var(--muted);
  border:none;background:none;cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all .2s;
}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-tab:hover:not(.active){color:var(--text)}

/* main content */
.content{padding:20px;max-width:1100px;margin:0 auto;width:100%}

/* ── CARDS KPI ─────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.kpi-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 20px;
}
.kpi-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.kpi-value{font-size:24px;font-weight:800;color:var(--text)}
.kpi-value.positive{color:var(--green)}
.kpi-value.negative{color:var(--red)}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* ── TABLA FINANCIERA ───────────────────────────────── */
.section-title{
  font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

.fin-table{width:100%;border-collapse:collapse;margin-bottom:28px}
.fin-table th{
  font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;
  letter-spacing:.06em;padding:10px 14px;text-align:left;
  border-bottom:1px solid var(--border);background:var(--surface2);
}
.fin-table th:last-child,.fin-table td:last-child{text-align:right}
.fin-table td{
  padding:11px 14px;font-size:13px;color:var(--text);
  border-bottom:1px solid rgba(36,48,68,.5);
}
.fin-table tr:hover td{background:rgba(0,194,255,.03)}
.fin-table tr.subtotal td{font-weight:700;color:var(--accent);background:rgba(0,194,255,.06)}
.fin-table tr.total td{font-weight:800;font-size:14px;color:var(--green);background:rgba(0,229,160,.06)}
.fin-table tr.negative-total td{color:var(--red);background:rgba(255,77,109,.06)}
.fin-table tr.group-header td{
  font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.08em;background:var(--surface2);padding:8px 14px;
}
.amount{font-variant-numeric:tabular-nums;font-family:'Courier New',monospace;font-size:13px}
.amount.neg{color:var(--red)}
.amount.pos{color:var(--green)}

/* ── PANEL ADMIN ────────────────────────────────────── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.panel h3{font-size:14px;font-weight:700;margin-bottom:16px;color:var(--text)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-field label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.form-field input,.form-field select,.form-field textarea{
  width:100%;padding:9px 12px;background:var(--surface2);
  border:1.5px solid var(--border);border-radius:8px;
  color:var(--text);font-size:13px;outline:none;transition:border-color .2s;
}
.form-field input:focus,.form-field select:focus{border-color:var(--accent)}
.form-field select option{background:var(--surface2)}
.btn-sm{
  padding:8px 16px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;
  transition:opacity .2s;
}
.btn-success{background:var(--green);color:#0f1923}
.btn-danger{background:var(--red);color:#fff}
.btn-accent{background:var(--accent);color:#0f1923}
.btn-sm:hover{opacity:.85}

/* usuarios table */
.user-table{width:100%;border-collapse:collapse}
.user-table th{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:8px 12px;border-bottom:1px solid var(--border);text-align:left}
.user-table td{padding:10px 12px;font-size:13px;border-bottom:1px solid rgba(36,48,68,.4)}
.user-table tr:hover td{background:rgba(255,255,255,.02)}

/* ── TOAST ─────────────────────────────────────────── */
#toast{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;
}
#toast.show{transform:translateY(0);opacity:1}
#toast.ok{border-left:3px solid var(--green);color:var(--green)}
#toast.err{border-left:3px solid var(--red);color:var(--red)}

/* ── SESSION TIMER ──────────────────────────────────── */
#sessionBar{
  background:var(--surface2);border-bottom:1px solid var(--border);
  padding:4px 20px;display:flex;align-items:center;justify-content:flex-end;gap:8px;
  font-size:11px;color:var(--muted);
}
#sessionTimer{font-weight:600;font-family:'Courier New',monospace;color:var(--yellow)}

/* ── LOADING SPINNER ────────────────────────────────── */
.spinner{
  width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;margin:40px auto;display:block;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap{text-align:center;padding:40px;color:var(--muted);font-size:13px}

/* ── RESPONSIVE ─────────────────────────────────────── */
@media(max-width:600px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .topbar-user span.name{display:none}
  .btn-icon .label{display:none}
  .content{padding:14px}
  .kpi-grid{grid-template-columns:1fr 1fr}
}

/* ── KPI PRESUPUESTO CLICKEABLE ─────────────────────── */
.kpi-card{
  cursor:default;transition:transform .18s,border-color .18s,box-shadow .18s;
}
.kpi-card.kpi-clickable{
  cursor:pointer;border:1.5px solid var(--border);
}
.kpi-card.kpi-clickable:hover{
  border-color:var(--accent);transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(0,194,255,.18);
}
.kpi-card.kpi-clickable:active{transform:translateY(-1px);}
.kpi-click-hint{
  font-size:10px;color:var(--accent);font-weight:600;
  letter-spacing:.04em;margin-top:6px;opacity:.8;
}
.kpi-budget-bar{
  height:4px;border-radius:2px;background:var(--border);
  margin-top:10px;overflow:hidden;
}
.kpi-budget-bar-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--green),var(--accent));
  transition:width .6s cubic-bezier(.4,0,.2,1);
}

/* ── MODAL PRESUPUESTO ──────────────────────────────── */
#budgetModal{
  position:fixed;inset:0;z-index:2000;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.6);backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:opacity .25s;
}
#budgetModal.open{opacity:1;pointer-events:all;}
.budget-modal-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:32px 28px;width:100%;max-width:420px;
  box-shadow:0 32px 80px rgba(0,0,0,.5);
  transform:translateY(24px);transition:transform .25s;
}
#budgetModal.open .budget-modal-card{transform:translateY(0);}
.budget-modal-title{
  font-size:16px;font-weight:800;margin-bottom:4px;color:var(--text);
}
.budget-modal-sub{
  font-size:12px;color:var(--muted);margin-bottom:22px;
}
.budget-tabs{
  display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;
}
.budget-tab{
  padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;
  border:1.5px solid var(--border);background:transparent;color:var(--muted);
  cursor:pointer;transition:all .18s;
}
.budget-tab.active{
  background:var(--accent);border-color:var(--accent);color:#000;
}
.budget-row{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;
}
.budget-field label{
  font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px;
}
.budget-field input,.budget-field select{
  width:100%;padding:10px 12px;background:var(--surface2);
  border:1.5px solid var(--border);border-radius:8px;
  color:var(--text);font-size:14px;font-weight:600;outline:none;
  transition:border-color .2s;
}
.budget-field input:focus,.budget-field select:focus{border-color:var(--accent);}
.budget-modal-actions{
  display:flex;gap:10px;margin-top:20px;
}
.budget-modal-actions button{flex:1;}

/* ── ACCORDIONS (menús plegables) ──────────────────── */
.accordion{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:14px;overflow:hidden;
}
.accordion-header{
  display:flex;align-items:center;gap:10px;padding:14px 18px;
  cursor:pointer;user-select:none;transition:background .18s;
}
.accordion-header:hover{background:rgba(0,194,255,.04);}
.accordion-icon{
  font-size:16px;line-height:1;
}
.accordion-title{
  font-size:13px;font-weight:700;color:var(--text);flex:1;
}
.accordion-badge{
  font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;
  background:rgba(0,194,255,.12);color:var(--accent);
}
.accordion-chevron{
  width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;
  transition:transform .25s;flex-shrink:0;
}
.accordion.open .accordion-chevron{transform:rotate(180deg);}
.accordion-body{
  max-height:0;overflow:hidden;
  transition:max-height .35s cubic-bezier(.4,0,.2,1);
}
.accordion.open .accordion-body{max-height:2000px;}
.accordion-inner{padding:0 18px 18px;}
</style>
</head>
<body>

<!-- ══════════════════ LOGIN ══════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
    </div>
    <h1>Mi Technologies</h1>
    <p id="loginDesc">Reporte financiero confidencial</p>

    <div class="field">
      <label>Usuario</label>
      <input id="usr" type="text" autocapitalize="off" autocomplete="off" placeholder="nombre.apellido">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input id="pwd" type="password" autocomplete="off" placeholder="••••••••">
    </div>

    <!-- primer acceso -->
    <div id="cambioBox" style="display:none">
      <div style="font-size:12px;color:var(--accent);font-weight:600;margin-bottom:12px;padding:10px 12px;background:rgba(0,194,255,.08);border-radius:8px;border-left:3px solid var(--accent)">
        🔐 Primer acceso — elige tu contraseña personal
      </div>
      <div class="field">
        <label>Nueva contraseña</label>
        <input id="pwd2" type="password" autocomplete="new-password" placeholder="Mínimo 8 caracteres">
      </div>
      <div id="pwdStrength"></div>
      <div class="field">
        <label>Confirmar contraseña</label>
        <input id="pwd3" type="password" autocomplete="new-password" placeholder="Repite la contraseña">
      </div>
    </div>

    <button class="btn-primary" id="loginBtn" onclick="doLogin()">Entrar</button>
    <div id="loginErr"></div>
  </div>
</div>

<!-- ══════════════════ APP ══════════════════ -->
<div id="app">
  <!-- top bar -->
  <div class="topbar">
    <div class="topbar-logo">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>
    <div class="topbar-title">Mi Technologies</div>
    <div class="topbar-user">
      <span class="name" id="topName"></span>
      <span class="role-badge" id="topRole"></span>
      <button class="btn-icon" onclick="exportExcel()" id="btnExport">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span class="label">Excel</span>
      </button>
      <button class="btn-icon" onclick="doLogout()">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span class="label">Salir</span>
      </button>
    </div>
  </div>

  <!-- session bar -->
  <div id="sessionBar">
    Sesión activa · expira en <span id="sessionTimer">10:00</span>
    <button class="btn-icon" onclick="resetTimer()" style="padding:2px 8px;font-size:10px">Renovar</button>
  </div>

  <!-- nav tabs -->
  <div class="nav" id="navTabs">
    <button class="nav-tab active" onclick="showTab('dashboard')" data-tab="dashboard">📊 Dashboard</button>
    <button class="nav-tab" onclick="showTab('reporte')" data-tab="reporte">📋 Reporte</button>
    <button class="nav-tab" onclick="showTab('cxp')" data-tab="cxp">💳 CxP</button>
    <button class="nav-tab admin-only" onclick="showTab('captura')" data-tab="captura" style="display:none">✏️ Captura</button>
    <button class="nav-tab admin-only" onclick="showTab('usuarios')" data-tab="usuarios" style="display:none">👥 Usuarios</button>
    <button class="nav-tab admin-only" onclick="showTab('catalogo')" data-tab="catalogo" style="display:none">📂 Catálogo</button>
  </div>

  <!-- content area -->
  <div class="content" id="mainContent">
    <div class="loading-wrap"><div class="spinner"></div>Cargando datos…</div>
  </div>
</div>

<!-- ══════════ MODAL PRESUPUESTO ══════════ -->
<div id="budgetModal">
  <div class="budget-modal-card">
    <div class="budget-modal-title">💰 Presupuesto Semanal</div>
    <div class="budget-modal-sub">Semana en curso · elige moneda y captura el monto</div>

    <!-- Selector de moneda -->
    <div class="budget-tabs" style="margin-bottom:16px;">
      <button class="budget-tab active" id="btnMXN" onclick="budgetSetMoneda('MXN',this)">🇲🇽 Peso MXN</button>
      <button class="budget-tab" id="btnUSD" onclick="budgetSetMoneda('USD',this)">🇺🇸 Dólar USD</button>
    </div>

    <!-- Semana activa (solo lectura, calculada automáticamente) -->
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;">
      <span style="font-size:18px;">📅</span>
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;">Semana activa</div>
        <div id="budgetSemanaLabel" style="font-size:13px;font-weight:600;color:var(--text);"></div>
      </div>
    </div>

    <div class="budget-row">
      <div class="budget-field">
        <label id="budgetMontoLabel">Monto Presupuestado (MXN)</label>
        <input id="budgetMonto" type="number" placeholder="0.00" step="100" min="0">
      </div>
      <div class="budget-field">
        <label>Alerta al % del gasto</label>
        <input id="budgetAlerta" type="number" placeholder="80" min="1" max="100" value="80">
      </div>
    </div>
    <div class="budget-row" style="grid-template-columns:1fr;">
      <div class="budget-field">
        <label>Notas</label>
        <input id="budgetNotas" type="text" placeholder="Descripción opcional…">
      </div>
    </div>

    <div id="budgetListWrap" style="margin-top:14px;display:none;">
      <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">Semanas guardadas</div>
      <div id="budgetList" style="max-height:140px;overflow-y:auto;"></div>
    </div>
    <div class="budget-modal-actions">
      <button class="btn-sm btn-accent" onclick="saveBudget()">💾 Guardar</button>
      <button class="btn-sm" style="background:var(--surface2);color:var(--text);" onclick="closeBudgetModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- toast -->

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function fmt(n) {
  if (n === null || n === undefined || n === '') return '—';
  const num = parseFloat(n);
  if (isNaN(num)) return '—';
  return new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',minimumFractionDigits:0,maximumFractionDigits:0}).format(num);
}

function fmtPct(n) {
  if (n === null || n === undefined) return '—';
  return parseFloat(n).toFixed(1) + '%';
}

    if (sessionSeconds <= 60) document.getElementById('sessionTimer').style.color = 'var(--red)';

function getWeekKey(date) {
  const d = date ? new Date(date) : new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return d.getFullYear() + '-W' + String(week).padStart(2, '0');
}

function getWeekLabel(weekKey) {
  const [year, wStr] = weekKey.split('-W');
  const w = parseInt(wStr);
  const jan1 = new Date(parseInt(year), 0, 1);
  const dayOfWeek = jan1.getDay() || 7;
  const monday = new Date(jan1);
  monday.setDate(jan1.getDate() + (w - 1) * 7 - (dayOfWeek - 1));
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const opts = { day: 'numeric', month: 'short' };
  return monday.toLocaleDateString('es-MX', opts) + ' – ' + sunday.toLocaleDateString('es-MX', { ...opts, year: 'numeric' });
}

function fmtBudget(n, moneda) {
  const m = moneda || budgetMoneda;
  if (m === 'USD') return '$' + (n||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' USD';
  return '$' + (n||0).toLocaleString('es-MX', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' MXN';
}

        <svg class="accordion-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="accordion-body"><div class="accordion-inner">`;

  if (colCategoria) {
    const grupos = {};
    cat.forEach(row => {
      const g = row[colCategoria] || 'Sin categoría';
      if (!grupos[g]) grupos[g] = [];
      grupos[g].push(row);
    });

    html += `<table class="fin-table">
      <thead><tr>
        <th>Concepto</th>
        ${colMonto ? '<th>Monto</th>' : ''}
        ${cols.filter(c=>c!==colConcepto&&c!==colCategoria&&c!==colMonto&&c!=='id'&&c!=='created_at').map(c=>`<th>${c}</th>`).join('')}
      </tr></thead>
      <tbody>`;

    let grandTotal = 0;
    Object.entries(grupos).forEach(([grupo, rows]) => {
      html += `<tr class="group-header"><td colspan="99">${grupo}</td></tr>`;
      let subTotal = 0;
      rows.forEach(row => {
        const monto = colMonto ? parseFloat(row[colMonto] || 0) : null;
        if (monto) subTotal += monto;
        const extraCols = cols.filter(c=>c!==colConcepto&&c!==colCategoria&&c!==colMonto&&c!=='id'&&c!=='created_at');
        html += `<tr>
          <td>${row[colConcepto]||'—'}</td>
          ${colMonto ? `<td><span class="amount ${monto<0?'neg':''}">${fmt(monto)}</span></td>` : ''}
          ${extraCols.map(c=>`<td>${row[c]??'—'}</td>`).join('')}
        </tr>`;
      });
      if (colMonto) {
        grandTotal += subTotal;
        html += `<tr class="subtotal"><td>Subtotal ${grupo}</td><td>${fmt(subTotal)}</td></tr>`;
      }
    });

    if (colMonto) {
      html += `<tr class="${grandTotal>=0?'total':'negative-total'}"><td>TOTAL</td><td>${fmt(grandTotal)}</td></tr>`;
    }
    html += `</tbody></table>`;
  } else {
    // Sin categoría, tabla simple
    const visibleCols = cols.filter(c=>c!=='id'&&c!=='created_at');
    html += `<table class="fin-table">
      <thead><tr>${visibleCols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>
        ${cat.map(row=>`<tr>${visibleCols.map(c=>`<td>${row[c]??'—'}</td>`).join('')}</tr>`).join('')}
      </tbody>
    </table>`;
  }

  // Cerrar accordion
  html += `</div></div></div>`;

  // Accordion de registros financieros
  if (dat.length > 0) {
    const datCols = Object.keys(dat[0]).filter(c=>c!=='id');
    html += `
      <div class="accordion open">
        <div class="accordion-header" onclick="toggleAccordion(this)">
          <span class="accordion-icon">🗂️</span>
          <span class="accordion-title">Registros Financieros</span>
          <span class="accordion-badge">${dat.length} registros</span>
          <svg class="accordion-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="accordion-body"><div class="accordion-inner">
          <table class="fin-table">
            <thead><tr><th>#</th>${datCols.map(c=>'<th>'+c+'</th>').join('')}</tr></thead>
            <tbody>
              ${dat.slice(0,30).map((row,i)=>'<tr><td style="color:var(--muted)">'+(i+1)+'</td>'+datCols.map(c=>'<td>'+(row[c]??'—')+'</td>').join('')+'</tr>').join('')}
            </tbody>
          </table>
          <div style="font-size:11px;color:var(--muted);margin-top:8px;">Mostrando \${Math.min(30,dat.length)} de \${dat.length} registros</div>
        </div></div>
      </div>`;
  }

  c.innerHTML = html;
}

  const dat = allData.datos || [];

async function saveCaptura() {
  const concepto_id = document.getElementById('capConcepto').value;
  const periodo     = document.getElementById('capPeriodo').value;
  const monto       = parseFloat(document.getElementById('capMonto').value);
  const tipo        = document.getElementById('capTipo').value;
  const notas       = document.getElementById('capNotas').value;

  if (!concepto_id || !periodo || isNaN(monto)) {
    toast('Completa concepto, período y monto', 'err'); return;
  }

  const tableName = allData.datosTable || 'datos_financieros';
  const payload = { concepto_id, periodo, monto, tipo, notas, capturado_por: currentUser.nombre };

  const { error } = await sb.from(tableName).insert([payload]);
  if (error) {
    // Si la tabla no existe, intentar crearla via SQL no es posible con anon key
    toast(`Error: ${error.message}`, 'err');
    console.error(error);
    return;
  }
  toast('Registro guardado ✓');
  document.getElementById('capMonto').value = '';
  document.getElementById('capNotas').value = '';
  await loadAllData();
  document.getElementById('capTabla').innerHTML = renderDatosTable();
}

async function deleteRegistro(id) {
  if (!confirm('¿Eliminar este registro?')) return;
  const { error } = await sb.from(allData.datosTable).delete().eq('id', id);
  if (error) { toast('Error al eliminar', 'err'); return; }
  toast('Registro eliminado');
  await loadAllData();
  showTab('captura');
}

async function toggleUser(id, activo) {
  const { error } = await sb.from('usuarios').update({ activo: !activo }).eq('id', id);
  if (error) { toast('Error al actualizar', 'err'); return; }
  toast(`Usuario ${activo?'desactivado':'activado'} ✓`);
  const { data } = await sb.from('usuarios').select('id,username,nombre,rol,activo,debe_cambiar');
  if (data) allData.usuarios = data;
  showTab('usuarios');
}

async function resetPwd(id) {
  if (!confirm('¿Forzar cambio de contraseña en el próximo acceso?')) return;
  const { error } = await sb.from('usuarios').update({ debe_cambiar: true }).eq('id', id);
  if (error) { toast('Error', 'err'); return; }
  toast('Se pedirá nueva contraseña en el próximo acceso ✓');
  const { data } = await sb.from('usuarios').select('id,username,nombre,rol,activo,debe_cambiar');
  if (data) allData.usuarios = data;
  showTab('usuarios');
}

async function createUser() {
  const usuario = document.getElementById('nuUsuario').value.trim();
  const nombre  = document.getElementById('nuNombre').value.trim();
  const rol     = document.getElementById('nuRol').value;
  const pwd     = document.getElementById('nuPwd').value;

  if (!usuario||!nombre||!pwd) { toast('Completa todos los campos', 'err'); return; }
  if (pwd.length < 8) { toast('Contraseña mínimo 8 caracteres', 'err'); return; }

  const hash = await sha256(pwd);
  const { error } = await sb.from('usuarios').insert([{
    username: usuario, nombre, rol, pwd_hash: hash, activo: true, debe_cambiar: false
  }]);
  if (error) { toast(`Error: ${error.message}`, 'err'); return; }
  toast(`Usuario ${usuario} creado ✓`);
  const { data } = await sb.from('usuarios').select('id,username,nombre,rol,activo,debe_cambiar');
  if (data) allData.usuarios = data;
  showTab('usuarios');
}

   EXPORT EXCEL
══════════════════════════════════════════ */
function exportExcel() {
  const cat = allData.catalogo || [];
  const dat = allData.datos || [];
  if (cat.length === 0 && dat.length === 0) { toast('Sin datos para exportar', 'err'); return; }

  const wb = XLSX.utils.book_new();
  if (cat.length > 0) {
    const ws1 = XLSX.utils.json_to_sheet(cat);
    XLSX.utils.book_append_sheet(wb, ws1, 'Catálogo');
  }
  if (dat.length > 0) {
    const ws2 = XLSX.utils.json_to_sheet(dat);
    XLSX.utils.book_append_sheet(wb, ws2, 'Datos Financieros');
  }
  const fecha = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `MiTech_Reporte_${fecha}.xlsx`);
  toast('Excel descargado ✓');
}

.cxp-res-val{font-size:18px;font-weight:800;margin-top:2px;}
.cxp-banner{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:14px;}
.cxp-banner.ban-all{background:rgba(88,166,255,.12);color:#58a6ff;}
.cxp-banner.ban-recom{background:rgba(0,229,160,.12);color:var(--green);}

.cxp-banner.ban-surv{background:rgba(255,77,109,.12);color:var(--red);}
  `;
  document.head.appendChild(s);
})();

/* ── RENDER PRINCIPAL ────────────────────── */
function renderCxP(c) {
  c.innerHTML = `
    <!-- Accordion Upload CxP -->
    <div class="accordion open">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <span class="accordion-icon">📂</span>
        <span class="accordion-title">Cargar Archivo de CxP</span>
        <svg class="accordion-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="accordion-body"><div class="accordion-inner">
    <!-- Upload -->
    <div class="cxp-upload" id="cxpUploadZone" onclick="document.getElementById('cxpFileInput').click()">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="1.8">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p><strong>📂 Cargar Excel de CxP</strong> · Arrastra o haz clic</p>
      <p style="font-size:11px;margin-top:4px;">Formato .xlsx · columnas: TIPO, CATEGORIA, CONCEPTO, TOTAL, RECOMENDADO, URGENTE, SUPERVIVENCIA</p>
      <div class="cxp-upload-status" id="cxpUploadStatus">${cxpData.length > 0 ? '✔ '+cxpData.length+' conceptos cargados' : '📊 Sin archivo cargado · usando Supabase como fallback'}</div>
    </div>
    <input type="file" id="cxpFileInput" accept=".xlsx,.xls" onchange="cxpHandleFile(event)">
      </div></div>
    </div><!-- /.accordion upload -->

    <!-- Accordion KPIs CxP -->
    <div class="accordion open">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <span class="accordion-icon">💳</span>
        <span class="accordion-title">Indicadores de CxP</span>
        <svg class="accordion-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="accordion-body"><div class="accordion-inner">
        <!-- KPIs -->
        <div class="cxp-kpi-grid" id="cxpKpiGrid"></div>
        <!-- Banner plan activo -->
        <div id="cxpBanner" style="display:none"></div>
      </div></div>
    </div><!-- /.accordion KPIs -->

    <!-- Accordion Detalle CxP -->
    <div class="accordion open">
      <div class="accordion-header" onclick="toggleAccordion(this)">
        <span class="accordion-icon">📋</span>
        <span class="accordion-title">Cuentas por Pagar — Detalle</span>
        <svg class="accordion-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="accordion-body"><div class="accordion-inner">
        <!-- Chips categoría -->
        <div class="cxp-chips" id="cxpChips"></div>
        <!-- Tabla -->
        <div class="cxp-table-wrap">
          <table class="cxp-table" id="cxpTabla">
            <thead id="cxpHead"></thead>
            <tbody id="cxpBody"></tbody>
          </table>
        </div>
      </div></div>
    </div><!-- /.accordion detalle -->
  `;

  /* Drag & drop */
  const zone = document.getElementById('cxpUploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f) cxpHandleFile({ target: { files: [f] } });
  });

  if (cxpData.length > 0) {
    cxpRenderAll();
  } else {
    cxpLoadSupabase();
  }
}

/* ── CARGA EXCEL ─────────────────────────── */
async function cxpHandleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('cxpUploadStatus').textContent = '⏳ Procesando ' + file.name + '…';
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const sheetName = wb.SheetNames.find(n => /rep|cxp|cuentas|pagar/i.test(n)) || wb.SheetNames[0];
    const ws = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: null });

    // Normalizar columnas (acepta mayúsculas/minúsculas/tildes)
    const norm = s => (s||'').toString().toUpperCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();

    cxpData = rows
      .filter(r => {
        const keys = Object.keys(r);
        return keys.some(k => norm(k).includes('CONCEPTO') || norm(k).includes('CONCEPT'));
      })
      .map(r => {
        const find = (keywords) => {
          const k = Object.keys(r).find(k => keywords.some(kw => norm(k).includes(kw)));
          return k ? r[k] : null;
        };
        return {
          tipo:         find(['TIPO','TYPE']) || '',
          nivel:        find(['NIVEL','LEVEL']) || '',
          categoria:    find(['CATEG','GRUPO','GROUP']) || 'General',
          concepto:     find(['CONCEPTO','CONCEPT','NOMBRE','NAME','DESCRIPCION']) || '',
          nota:         find(['NOTA','NOTE','OBS']) || '',
          total:        parseFloat(find(['TOTAL','TOT']) || 0),
          recomendado:  parseFloat(find(['RECOM']) || 0),
          urgente:      parseFloat(find(['URG']) || 0),
          supervivencia:parseFloat(find(['SUPERV','SURV','SOB']) || 0),
        };
      })
      .filter(r => r.concepto && r.concepto.toString().trim() !== '');

    document.getElementById('cxpUploadStatus').textContent = '✔ ' + file.name + ' · ' + cxpData.length + ' conceptos';
    toast('Excel cargado: ' + cxpData.length + ' conceptos ✓');
    cxpFiltro = 'all';
    cxpCategoria = null;
    cxpRenderAll();
  } catch(err) {
    console.error(err);
    document.getElementById('cxpUploadStatus').textContent = '❌ Error al leer el archivo';
    toast('Error al leer Excel', 'err');
  }
}

/* ── CARGA SUPABASE (fallback) ───────────── */
async function cxpLoadSupabase() {
  document.getElementById('cxpBody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--muted)"><div class="spinner" style="margin:0 auto 10px"></div>Cargando desde Supabase…</td></tr>';
  try {
    const { data, error } = await sb.from('catalogo_cxp').select('*').order('categoria');
    if (error || !data || data.length === 0) {
      document.getElementById('cxpBody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--muted)">Sin datos en Supabase. Carga un Excel para comenzar.</td></tr>';
      return;
    }
    // Mapear columnas de Supabase al formato interno
    cxpData = data.map(r => ({
      tipo:          r.tipo || '',
      nivel:         r.nivel || '',
      categoria:     r.categoria || r.grupo || 'General',
      concepto:      r.concepto || r.nombre || r.descripcion || '',
      nota:          r.nota || '',
      total:         parseFloat(r.total || r.monto || 0),
      recomendado:   parseFloat(r.recomendado || 0),
      urgente:       parseFloat(r.urgente || 0),
      supervivencia: parseFloat(r.supervivencia || r.sobrevivencia || 0),
    })).filter(r => r.concepto.trim() !== '');
    document.getElementById('cxpUploadStatus').textContent = '✔ Supabase · catalogo_cxp · ' + cxpData.length + ' conceptos';
    cxpRenderAll();
  } catch(err) {
    console.error(err);
    document.getElementById('cxpBody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--red)">Error de conexión. Carga un Excel para trabajar offline.</td></tr>';
  }
}

/* ── RENDER KPIs ─────────────────────────── */
function cxpRenderKPIs(rows) {
  const sumCol = col => rows.reduce((s, r) => s + (parseFloat(r[col]) || 0), 0);
  const tot = sumCol('total');
  const rec = sumCol('recomendado');
  const urg = sumCol('urgente');
  const srv = sumCol('supervivencia');
  const n = rows.length;

  const kpis = [
    { id:'all',          label:'💰 Total General',    val:tot, sub:n+' conceptos', pct:100,           barW:100,                  barC:'#58a6ff', cls:'', txtC:'c-total' },
    { id:'recomendado',  label:'✅ Recomendado',       val:rec, sub:'Pago óptimo', pct:tot?rec/tot*100:0, barW:tot?rec/tot*100:0, barC:'#3fb950', cls:'active-recom', txtC:'c-recom' },
    { id:'urgente',      label:'⚠️ Urgente',           val:urg, sub:'Pago inmediato', pct:tot?urg/tot*100:0, barW:tot?urg/tot*100:0, barC:'#f0883e', cls:'active-urg', txtC:'c-urg' },
    { id:'supervivencia',label:'🆘 Supervivencia',     val:srv, sub:'Mínimo crítico', pct:tot?srv/tot*100:0, barW:tot?srv/tot*100:0, barC:'#ff4d6d', cls:'active-surv', txtC:'c-surv' },
  ];

  document.getElementById('cxpKpiGrid').innerHTML = kpis.map(k => `
    <div class="cxp-kpi ${cxpFiltro===k.id ? (k.cls||'active-kpi') : ''}" onclick="cxpSetFiltro('${k.id}')">
      <div class="cxp-kpi-label">${k.label}</div>
      <div class="cxp-kpi-val ${k.txtC}">${fmt(k.val)}</div>
      <div class="cxp-kpi-sub">${k.sub}</div>
      <div class="cxp-kpi-pct ${k.txtC}">${k.pct.toFixed(1)}% del total</div>
      <div class="cxp-kpi-bar"><div class="cxp-kpi-bar-fill" style="width:${k.barW.toFixed(1)}%;background:${k.barC}"></div></div>
    </div>
  `).join('');
}

/* ── RENDER CHIPS ────────────────────────── */
function cxpRenderChips(rows) {
  const cats = [...new Set(rows.map(r => r.categoria).filter(Boolean))].sort();
  document.getElementById('cxpChips').innerHTML =
    ['Todos', ...cats].map(cat => `
      <span class="cxp-chip ${(cat==='Todos'&&!cxpCategoria)||(cat===cxpCategoria)?'chip-active':''}"
        onclick="cxpSetCategoria('${cat}')">${cat}</span>
    `).join('');
}

/* ── RENDER TABLA ────────────────────────── */
function cxpRenderTabla(rows) {
  const col = cxpFiltro;
  const banner = document.getElementById('cxpBanner');

  const bannerCfg = {
    all:          { cls:'ban-all',   txt:'📊 Mostrando TOTAL GENERAL — todos los conceptos y montos completos' },
    recomendado:  { cls:'ban-recom', txt:'✅ Plan RECOMENDADO — monto óptimo sugerido para cada concepto' },
    urgente:      { cls:'ban-urg',   txt:'⚠️ Plan URGENTE — pagos de atención inmediata' },
    supervivencia:{ cls:'ban-surv',  txt:'🆘 Plan SUPERVIVENCIA — monto mínimo crítico para operar' },
  };
  const bc = bannerCfg[col] || bannerCfg.all;
  banner.style.display = '';
  banner.className = 'cxp-banner ' + bc.cls;
  banner.textContent = bc.txt;

  const colPlan = col === 'all' ? null : col;

  // Encabezado
  document.getElementById('cxpHead').innerHTML = `<tr>
    <th style="text-align:left">Concepto</th>
    <th>Categoría</th>
    <th class="${col==='all'?'col-active':''}">Total</th>
    ${colPlan ? `<th class="${'col-'+colPlan}">${colPlan.charAt(0).toUpperCase()+colPlan.slice(1)}</th>` : ''}
  </tr>`;

  // Filtrar por categoría
  const filtradas = cxpCategoria ? rows.filter(r => r.categoria === cxpCategoria) : rows;

  // Agrupar por categoría
  const grupos = {};
  filtradas.forEach(r => {
    const g = r.categoria || 'General';
    if (!grupos[g]) grupos[g] = [];
    grupos[g].push(r);
  });

  let html = '';
  let grandTotal = 0, grandPlan = 0;

  Object.entries(grupos).forEach(([grupo, gRows]) => {
    const subtot  = gRows.reduce((s,r) => s + (r.total||0), 0);
    const subplan = colPlan ? gRows.reduce((s,r) => s + (r[colPlan]||0), 0) : null;
    grandTotal += subtot;
    if (subplan !== null) grandPlan += subplan;

    html += `<tr class="cxp-group"><th colspan="99">${grupo} <span style="font-weight:400;color:var(--muted)">(${gRows.length})</span></th></tr>`;
    gRows.forEach(r => {
      html += `<tr>
        <td>${r.concepto}${r.nota ? `<br><span style="font-size:10px;color:var(--muted)">${r.nota}</span>` : ''}</td>
        <td style="text-align:right;color:var(--muted);font-size:11px">${r.tipo||''}</td>
        <td class="${col==='all'?'col-active':''}">${fmt(r.total)}</td>
        ${colPlan ? `<td class="${'col-'+colPlan}">${fmt(r[colPlan])}</td>` : ''}
      </tr>`;
    });

    if (gRows.length > 2) {
      html += `<tr>
        <td style="font-weight:700;font-size:11px;color:var(--muted)">— Subtotal ${grupo}</td>
        <td></td>
        <td style="font-weight:700">${fmt(subtot)}</td>
        ${colPlan ? `<td style="font-weight:700">${fmt(subplan)}</td>` : ''}
      </tr>`;
    }
  });

  // Fila TOTAL
  html += `<tr class="cxp-total">
    <td>TOTAL GENERAL</td><td></td>
    <td class="${col==='all'?'col-active':''}">${fmt(grandTotal)}</td>
    ${colPlan ? `<td class="${'col-'+colPlan}">${fmt(grandPlan)}</td>` : ''}
  </tr>`;

  document.getElementById('cxpBody').innerHTML = html;
}

/* ── RENDER ALL ──────────────────────────── */
function cxpRenderAll() {
  if (!cxpData.length) return;
  const rows = cxpData.filter(r => r.concepto && r.total !== undefined);
  cxpRenderKPIs(rows);
  cxpRenderChips(rows);
  cxpRenderTabla(rows);
}

/* ── SETTERS ─────────────────────────────── */
function cxpSetFiltro(f) {
  cxpFiltro = f;
  cxpRenderAll();
}
function cxpSetCategoria(cat) {
  cxpCategoria = (cat === 'Todos') ? null : cat;
  cxpRenderAll();
}
