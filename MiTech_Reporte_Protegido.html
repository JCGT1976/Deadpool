function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function unlock(){
  const pwd=document.getElementById('pwd').value.trim().toUpperCase();
  const err=document.getElementById('err');
  err.textContent='';
  try{
    const enc=new TextEncoder();
    const keyMat=await crypto.subtle.importKey('raw',enc.encode(pwd),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt:b64(B.salt),iterations:B.iter,hash:'SHA-256'},
      keyMat,{name:'AES-GCM',length:256},false,['decrypt']);
    const data=b64(B.ct);
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(B.iv)},key,data);
    const html=new TextDecoder().decode(plain);
    document.getElementById('lock').style.display='none';
    const c=document.getElementById('content');
    c.innerHTML=html+'<div class="foot">Reporte confidencial · Proyecto Deadpool</div>';
    c.style.display='block';
    window.scrollTo(0,0);
  }catch(e){
    err.textContent='Clave incorrecta. Verifica e intenta de nuevo.';
  }
}
document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
</script>
